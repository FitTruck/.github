name: "🐛 Fix"
description: 버그 수정
title: "[FIX] "
labels: ["fix"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 버그 수정

  - type: textarea
    id: bug
    attributes:
      label: 💥 발생한 문제
      placeholder: 어떤 문제가 발생했나요?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 기대 동작
      placeholder: 원래 어떻게 동작해야 하나요?

  - type: textarea
    id: solution
    attributes:
      label: 🛠 해결 방법
      placeholder: 어떻게 수정할 예정인가요?
