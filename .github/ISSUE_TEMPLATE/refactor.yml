name: "♻️ Refactor"
description: 코드 리팩토링
title: "[REFACTOR] "
labels: ["refactor"]

body:
  - type: markdown
    attributes:
      value: |
        ## ♻️ 리팩토링

  - type: textarea
    id: target
    attributes:
      label: 📦 대상 코드
      placeholder: 어떤 부분을 리팩토링 하나요?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 🎯 리팩토링 이유
      placeholder: 유지보수성, 성능 개선 등

  - type: textarea
    id: changes
    attributes:
      label: 🔧 변경 예정 사항
      value: |
        - [ ] 구조 개선
        - [ ] 중복 제거
        - [ ] 타입 정리
